services:
  - type: web
    name: health-tracker-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w @health-tracker/shared && npm run build -w @health-tracker/api
    startCommand: npm start -w @health-tracker/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: health-tracker-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: health-tracker-db
    plan: free
    databaseName: health_tracker
    user: health_tracker_user
